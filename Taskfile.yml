version: '3'

env:
  DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib:/opt/homebrew/opt/libffi/lib

tasks:
  setup:
    desc: Install project dependencies in the uv environment
    cmds:
      - uv sync --all-groups

  html:
    desc: Generate the single-style HTML CV
    cmds:
      - uv run cv-gen html

  pdf:
    desc: Convert the generated HTML CV to PDF
    cmds:
      - uv run cv-gen pdf

  build:
    desc: Generate the single-style HTML and PDF CV
    cmds:
      - uv run cv-gen all

  clean:
    desc: Remove generated CV artifacts
    cmds:
      - uv run cv-gen clean

  rebuild:
    desc: Clean and rebuild all artifacts
    cmds:
      - task clean
      - task build
