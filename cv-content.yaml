experience:
  - company: YouGov (formerly GfK)
    position: Machine Learning Engineer
    location: Nuremberg, Germany
    startDate: July 2024
    endDate: Present
    summary: >
      Design and operation of production AI systems for retail intelligence
      and multimodal document processing.
    highlights:
      - Architected and deployed a production <strong>Receipt Intelligence Platform</strong> combining OCR, vision-language models, and LLM pipelines to extract structured FMCG retail data across international receipt formats.
      - Built scalable inference infrastructure using AWS Bedrock, Lambda, SQS, MongoDB, and Terraform enabling automated high-volume retail data processing.
      - Designed data-centric evaluation pipelines including synthetic dataset generation and error-driven feedback loops to improve model robustness against noisy real-world inputs.
      - Implemented MLOps framework for continuous model training and deployment using GitLab CI/CD, SageMaker Pipelines, and AWS API Gateway.
      - Developed model observability systems using ELK stack for comprehensive endpoint performance tracking, latency monitoring, and operational regression detection.

  - company: Machine Learning Reply GmbH
    position: Machine Learning Consultant
    location: Munich, Germany
    startDate: April 2022
    endDate: May 2024
    summary: >
      Delivered enterprise AI and data platform solutions across finance and
      automotive industries, contributing to €500k+ revenue growth.
    highlights:
      - Delivered applied AI solutions and data platforms for enterprise clients including <strong>Allianz, Volkswagen, and Porsche</strong> as part of a four-person team, contributing to €500k+ revenue growth.
      - Built containerised, privacy-preserving <strong>RAG Question Answering API</strong> on Azure using OpenAI embeddings, GPT-3.5, and FastAPI to support legal knowledge workflows for lawyers.
      - Migrated ~1 PB of data from Cloudera to AWS, rearchitecting Apache Pig and Hive jobs into Spark on EMR with GitLab and Apache Airflow CI/CD.
      - Managed SaaS Kubernetes platform for an insurance client, orchestrating data pipelines with Argo Workflows and deployments via ArgoCD.
      - Defined Prometheus metrics and built Grafana monitoring dashboards for a Kubernetes data platform, achieving <strong>50% reduction in MTTD</strong> for critical issues.
      - Designed secure enterprise ingestion pipelines integrating on-prem APIs with Azure Synapse for client security visibility dashboards (PowerBI).

