      Research focused on reliable AI systems for safety-critical environments.
    highlights:
      - Developed hybrid anomaly detection systems combining deep learning with rule-based reasoning for safety-critical industrial environments.
      - Applied contrastive learning (MoCo) to improve robustness in sparse anomaly detection scenarios.
      - Collaborated with domain experts to transition research prototypes into production-ready system designs.

